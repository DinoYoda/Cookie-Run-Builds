<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<button class="sidebar-toggle" id="sidebarToggle">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-game-selector">
    <button class="sidebar-game-btn" id="sidebarGameBtn">
      <span id="sidebarGameName">Loading…</span>
      <span class="sidebar-game-chevron">▾</span>
    </button>
    <div class="sidebar-game-menu" id="sidebarGameMenu"></div>
  </div>
  <div class="sidebar-header">Menu</div>
  <a href="characters.html" class="sidebar-link">Characters</a>
  <a href="index.html" class="sidebar-link">Tier Lists</a>
  <a href="info.html" class="sidebar-link">Info</a>
</div>

<div class="character-page">
  <div class="character-container">
      <div class="character-description" id="char-description">
          <!-- description inserted by JS -->
      </div>

      <div class="character-art">
          <img id="char-image">
      </div>

      <div class="char-info-box" id="char-info-box">
          <!-- rarity, type, position from data.js -->
      </div>
  </div>

  <div class="char-review-section" id="char-review-section" style="display:none">
      <!-- review text -->
  </div>

  <div class="char-skill-section" id="char-skill-section">
      <!-- skill: icon, cooldown, name, description -->
  </div>

  <div class="char-build-section" id="char-build-section">
      <!-- builds: toppings, beascuit -->
  </div>
</div>

<script src="data.js"></script>
<script src="crk_descriptions.js"></script>
<script src="char-ui.js"></script>
<script>
const st = document.getElementById("sidebarToggle")
const sb = document.getElementById("sidebar")
const ov = document.getElementById("sidebarOverlay")
st.addEventListener("click", () => { sb.classList.toggle("open"); ov.classList.toggle("open") })
ov.addEventListener("click", () => { sb.classList.remove("open"); ov.classList.remove("open") })
</script>
<script src="sidebar-game.js"></script>

</body>
</html>
