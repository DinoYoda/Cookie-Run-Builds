<div id="character-page">

    <div class="char-hero">

        <div class="char-description-panel">
            <h1 id="char-name"></h1>

            <div id="char-description"></div>
        </div>

        <div class="char-art">
            <img id="char-image">
        </div>

        <div class="char-side">

            <div id="char-rarity"></div>

            <div class="char-meta">
                <span id="char-type"></span>
                <span id="char-position"></span>
                <span id="char-element"></span>
            </div>

            <div class="starter-build">
                <h3>Starter Toppings</h3>
                <div id="starter-build"></div>
            </div>

        </div>

    </div>


    <section class="skill-section">
        <h2>Skill</h2>
        <div id="char-skill"></div>
    </section>


    <section class="build-section">
        <h2>Builds</h2>
        <div id="builds-container"></div>
    </section>

</div>
